<style>
:root,[data-theme="light"]{
--bg:#f7f6f2;--sf:#f9f8f5;--sf2:#fbfbf9;--sfo:#f3f0ec;--sfo2:#edeae5;
--sfd:#e6e4df;--div:#dcd9d5;--brd:#d4d1ca;
--tx:#28251d;--txm:#7a7974;--txb:#bab9b4;--txi:#f9f8f4;
--p:#01696f;--ph:#0c4e54;--phl:#cedcd8;
--ok:#437a22;--okh:#d4dfcc;
--wn:#964219;--wnh:#ddcfc6;
--er:#a12c7b;--erh:#e0ced7;
--gd:#d19900;--gdh:#e9e0c6;
--bl:#006494;--blh:#c6d8e4;
--fb:Inter,sans-serif;
--xs:clamp(.75rem,.7rem + .25vw,.875rem);
--sm:clamp(.875rem,.8rem + .35vw,1rem);
--base:clamp(1rem,.95rem + .25vw,1.125rem);
--lg:clamp(1.125rem,1rem + .75vw,1.5rem);
--xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
--s1:.25rem;--s2:.5rem;--s3:.75rem;--s4:1rem;
--s5:1.25rem;--s6:1.5rem;--s8:2rem;
--rsm:.375rem;--rmd:.5rem;--rlg:.75rem;--rxl:1rem;--rfl:9999px;
--shsm:0 1px 2px oklch(.2 .01 80/.06);
--shmd:0 4px 12px oklch(.2 .01 80/.08);
--shlg:0 12px 32px oklch(.2 .01 80/.12);
--tr:180ms cubic-bezier(.16,1,.3,1);
--sw:240px;
--bnav:0px;
}
[data-theme="dark"]{
--bg:#171614;--sf:#1c1b19;--sf2:#201f1d;--sfo:#1d1c1a;--sfo2:#22211f;
--sfd:#2d2c2a;--div:#262523;--brd:#393836;
--tx:#cdccca;--txm:#797876;--txb:#5a5957;--txi:#2b2a28;
--p:#4f98a3;--ph:#227f8b;--phl:#313b3b;
--ok:#6daa45;--okh:#3a4435;
--wn:#bb653b;--wnh:#564942;
--er:#d163a7;--erh:#4c3d46;
--gd:#e8af34;--gdh:#4d4332;
--bl:#5591c7;--blh:#3a4550;
--shsm:0 1px 2px oklch(0 0 0/.2);
--shmd:0 4px 12px oklch(0 0 0/.3);
--shlg:0 12px 32px oklch(0 0 0/.4);
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;height:100%;overflow:hidden}
body{height:100dvh;overflow:hidden;font-family:var(--fb);font-size:var(--sm);color:var(--tx);background:var(--bg)}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--p);outline-offset:3px;border-radius:var(--rsm)}
a,button{transition:color var(--tr),background var(--tr),border-color var(--tr),box-shadow var(--tr)}

/* ROLE SELECT */
#rs{display:flex;flex-direction:column;align-items:center;justify-content:center;
height:100dvh;gap:var(--s8);padding:var(--s8);background:var(--bg)}
.rs-logo{display:flex;align-items:center;gap:var(--s3);font-size:var(--lg);font-weight:700;color:var(--p)}
.rs-h{font-size:var(--xl);font-weight:700;text-align:center}
.rs-p{font-size:var(--sm);color:var(--txm);text-align:center;max-width:480px}
.rs-cards{display:flex;gap:var(--s6);flex-wrap:wrap;justify-content:center}
.rs-card{background:var(--sf);border:1px solid var(--brd);border-radius:var(--rxl);
padding:var(--s8);width:270px;cursor:pointer;text-align:left;
box-shadow:var(--shsm);transition:all var(--tr)}
.rs-card:hover{box-shadow:var(--shmd);border-color:var(--p);transform:translateY(-2px)}
.rs-icon{font-size:2.5rem;margin-bottom:var(--s4)}
.rs-name{font-size:var(--base);font-weight:700;margin-bottom:var(--s2)}
.rs-desc{font-size:var(--xs);color:var(--txm);line-height:1.6}
.rs-cta{display:inline-flex;align-items:center;gap:var(--s2);margin-top:var(--s4);
padding:var(--s2) var(--s4);background:var(--p);color:#fff;
border-radius:var(--rfl);font-size:var(--xs);font-weight:600}

/* APP */
#app{display:none;height:100dvh;overflow:hidden}
#app.on{display:grid;grid-template-columns:var(--sw) 1fr}

/* SIDEBAR */
.sb{background:var(--sf);border-right:1px solid var(--brd);
display:flex;flex-direction:column;overflow-y:auto;
overscroll-behavior:contain;padding:var(--s4) 0}
.sb-logo{display:flex;align-items:center;gap:var(--s3);
padding:var(--s2) var(--s5);margin-bottom:var(--s4);
font-weight:700;font-size:var(--sm)}
.sb-badge{margin:0 var(--s4) var(--s4);padding:var(--s2) var(--s3);
background:var(--phl);color:var(--p);border-radius:var(--rmd);
font-size:var(--xs);font-weight:600;display:flex;align-items:center;gap:var(--s2)}
.ni{display:flex;align-items:center;gap:var(--s3);padding:var(--s2) var(--s5);
font-size:var(--sm);font-weight:500;color:var(--txm);
cursor:pointer;width:100%;text-align:left;min-height:44px}
.ni:hover{background:var(--sfo);color:var(--tx)}
.ni.act{background:var(--phl);color:var(--p);font-weight:600}
.ni-icon{font-size:1rem;width:20px;text-align:center}
.sb-bot{margin-top:auto;padding:var(--s4) var(--s4) 0;
border-top:1px solid var(--brd);display:flex;flex-direction:column;gap:var(--s2)}
.sb-u{display:flex;align-items:center;gap:var(--s3);padding:var(--s3);
border-radius:var(--rmd);background:var(--sfo)}
.sb-av{width:32px;height:32px;border-radius:var(--rfl);background:var(--p);
color:#fff;display:flex;align-items:center;justify-content:center;
font-size:var(--xs);font-weight:700;flex-shrink:0}
.sb-un{font-size:var(--xs);font-weight:600;overflow:hidden;
text-overflow:ellipsis;white-space:nowrap}
.sb-ur{font-size:.68rem;color:var(--txm)}

/* BOTTOM NAV (mobile only) */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;
background:var(--sf);border-top:1px solid var(--brd);
padding:var(--s2) var(--s4);padding-bottom:calc(var(--s2) + env(safe-area-inset-bottom));
z-index:100;gap:4px}
.bnav-item{display:flex;flex-direction:column;align-items:center;
gap:2px;flex:1;padding:var(--s2) var(--s1);
font-size:.6rem;font-weight:500;color:var(--txm);
cursor:pointer;border-radius:var(--rmd);
min-height:44px;justify-content:center;transition:all var(--tr)}
.bnav-item:hover,.bnav-item.act{color:var(--p);background:var(--phl)}
.bnav-icon{font-size:1.2rem;line-height:1}

/* MAIN */
.ma{display:flex;flex-direction:column;overflow:hidden;height:100dvh}
.tb{display:flex;align-items:center;justify-content:space-between;
padding:var(--s4) var(--s8);background:var(--sf);
border-bottom:1px solid var(--brd);flex-shrink:0;z-index:10}
.tb-t{font-size:var(--base);font-weight:700}
.tb-s{font-size:var(--xs);color:var(--txm)}
.tb-a{display:flex;align-items:center;gap:var(--s3)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:var(--s2);
padding:var(--s2) var(--s4);border-radius:var(--rmd);
font-size:var(--xs);font-weight:600;cursor:pointer;
white-space:nowrap;min-height:36px}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--ph)}
.btn-g{background:transparent;color:var(--txm);border:1px solid var(--brd)}
.btn-g:hover{background:var(--sfo);color:var(--tx)}
.btn-sm{padding:var(--s1) var(--s3);font-size:.7rem;min-height:32px}
.tb-toggle{width:44px;height:44px;border-radius:var(--rmd);
display:flex;align-items:center;justify-content:center;
background:var(--sfo);color:var(--txm)}
.tb-toggle:hover{background:var(--sfd);color:var(--tx)}

/* CONTENT */
.ct{overflow-y:auto;overscroll-behavior:contain;flex:1;
padding:var(--s6) var(--s8);padding-bottom:calc(var(--s6) + var(--bnav))}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:var(--s4);margin-bottom:var(--s6)}
.kp{background:var(--sf);border:1px solid var(--brd);border-radius:var(--rlg);
padding:var(--s5);box-shadow:var(--shsm)}
.kp-l{font-size:var(--xs);color:var(--txm);font-weight:600;
text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--s2)}
.kp-v{font-size:var(--xl);font-weight:700;
font-variant-numeric:tabular-nums lining-nums;line-height:1}
.kp-d{display:flex;align-items:center;gap:var(--s1);margin-top:var(--s2);
font-size:var(--xs);font-weight:600;flex-wrap:wrap}
.dup{color:var(--ok)}.ddn{color:var(--er)}.dfl{color:var(--txm)}

/* CHARTS */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4);margin-bottom:var(--s6)}
.cc{background:var(--sf);border:1px solid var(--brd);border-radius:var(--rlg);
padding:var(--s5);box-shadow:var(--shsm)}
.cc-full{grid-column:1/-1}
.cc-t{font-size:var(--sm);font-weight:700;margin-bottom:var(--s4)}
.cw{position:relative;height:200px}
.cw-tall{height:260px}

/* TABLE */
.tc{background:var(--sf);border:1px solid var(--brd);border-radius:var(--rlg);
box-shadow:var(--shsm);overflow:hidden;margin-bottom:var(--s6)}
.tc-h{display:flex;align-items:center;justify-content:space-between;
padding:var(--s4) var(--s5);border-bottom:1px solid var(--div)}
.tc-t{font-size:var(--sm);font-weight:700}
.tc-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:500px}
th{padding:var(--s3) var(--s5);text-align:left;font-size:var(--xs);font-weight:600;
